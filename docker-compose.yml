services:

  app:
    build: .
    hostname: app
    restart: unless-stopped
    environment:
      PORT: "8080"
    volumes:
      - ./data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Ports are not published; external access is via cloudflared only

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    # In Cloudflare Zero Trust → your tunnel → Public Hostname:
    #   Service URL must be http://app:8080 (Docker DNS name), NOT localhost.
    # See cloudflared/config.example.yml

networks:
  internal:
    driver: bridge
